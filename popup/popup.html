<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>治愈太阳</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- 天气界面 -->
    <div id="weather-screen" class="screen">
      <!-- 加载状态 -->
      <div id="loading">
        <div class="loading-spinner"></div>
        <p>正在检测你的位置...</p>
      </div>

      <!-- 手动输入城市（定位失败时显示） -->
      <div id="manual-city" class="hidden">
        <p class="manual-icon">📍</p>
        <p>无法自动定位，请手动输入城市：</p>
        <div class="manual-city-form">
          <input type="text" id="city-input" placeholder="例如：北京">
          <button id="search-city-btn">查询</button>
        </div>
        <p id="city-error" class="error-msg hidden"></p>
      </div>

      <!-- 正常天气视图（非雨天） -->
      <div id="normal-view" class="hidden">
        <div class="weather-card">
          <div class="city-name" id="city-name"></div>
          <div class="weather-main">
            <span id="weather-icon" class="weather-icon-emoji"></span>
            <div class="temperature" id="temperature"></div>
          </div>
          <div class="weather-desc" id="weather-desc"></div>
          <div class="weather-details">
            <div class="detail-item">
              <span class="detail-label">湿度</span>
              <span class="detail-value" id="humidity"></span>
            </div>
            <div class="detail-item">
              <span class="detail-label">风速</span>
              <span class="detail-value" id="wind"></span>
            </div>
          </div>
          <div class="update-time" id="update-time"></div>
        </div>
      </div>

      <!-- 雨天治愈视图 -->
      <div id="rain-view" class="hidden">
        <p class="rain-message">外面在下雨...</p>
        <div id="healing-sun-container">
          <div class="sun-rays">
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
            <div class="ray"></div>
          </div>
          <div class="sun-body">
            <div class="sun-face">
              <div class="eye left-eye"></div>
              <div class="eye right-eye"></div>
              <div class="smile"></div>
            </div>
          </div>
        </div>
        <p class="healing-message">但在这里，太阳为你而亮</p>
        <div class="rain-info">
          <span id="rain-city-name"></span>
          <span class="rain-divider">·</span>
          <span id="rain-temperature"></span>
        </div>
      </div>

      <!-- 底部操作按钮 -->
      <button id="refresh-btn" class="hidden" title="刷新天气">🔄</button>
      <button id="reset-btn" class="hidden" title="重新定位">📍</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
